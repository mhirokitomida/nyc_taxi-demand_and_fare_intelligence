services:
  airflow-postgres:
    image: postgres:16-alpine
    container_name: nyc-taxi-airflow-postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.10.1-python3.12
    container_name: nyc-taxi-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    env_file:
      - ./config/airflow.env
    user: "50000:0"
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username $${_AIRFLOW_WWW_USER_USERNAME}
      --password $${_AIRFLOW_WWW_USER_PASSWORD}
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com || true"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data

  airflow-webserver:
    image: apache/airflow:2.10.1-python3.12
    container_name: nyc-taxi-airflow-webserver
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - ./config/airflow.env
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data

  airflow-scheduler:
    image: apache/airflow:2.10.1-python3.12
    container_name: nyc-taxi-airflow-scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - ./config/airflow.env
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data

  spark-master:
    image: spark:3.5.8-python3
    container_name: nyc-taxi-spark-master
    env_file:
      - ./config/spark.env
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "7077:7077"
      - "18080:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import socket; s=socket.create_connection(('spark-master', 7077), 5); s.close()\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - ./data:/opt/spark/data

  spark-worker:
    image: spark:3.5.8-python3
    container_name: nyc-taxi-spark-worker
    depends_on:
      spark-master:
        condition: service_healthy
    env_file:
      - ./config/spark.env
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 1
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --webui-port
      - "8081"
      - spark://spark-master:7077
    ports:
      - "18081:8081"
    volumes:
      - ./data:/opt/spark/data

  streamlit:
    image: python:3.12-slim
    container_name: nyc-taxi-streamlit
    working_dir: /app
    depends_on:
      airflow-webserver:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    env_file:
      - ./config/streamlit.env
    command: >
      bash -c "pip install --no-cache-dir streamlit &&
      streamlit run app/streamlit/Home.py
      --server.address=$${STREAMLIT_SERVER_ADDRESS}
      --server.port=$${STREAMLIT_SERVER_PORT}"
    ports:
      - "8501:8501"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health').read()\"",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
    volumes:
      - ./:/app

volumes:
  airflow-postgres-data:
